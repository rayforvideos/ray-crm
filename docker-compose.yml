services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ray_crm
      POSTGRES_USER: ray
      POSTGRES_PASSWORD: ray1234
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
